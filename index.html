<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI ChatBot</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🤖%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="chat-container">

        <div class="chat-header">
            <div class="logo">🤖</div>

            <div>
                <h2>SmartBot AI</h2>
                <p>Rule-Based Chat Assistant</p>
            </div>
        </div>

        <div class="chat-box" id="chat-box">

            <div class="bot-message">
                Hello 👋 I am SmartBot. Ask me anything!
            </div>

        </div>

        <div class="quick-buttons">
            <button onclick="quickMessage('Hello')">Hello</button>
            <button onclick="quickMessage('Time')">Time</button>
            <button onclick="quickMessage('Date')">Date</button>
            <button onclick="quickMessage('Joke')">Joke</button>
            <button onclick="quickMessage('Motivate me')">Motivate</button>
        </div>

        <div class="input-area">

            <input type="text" id="user-input" placeholder="Type your message...">

            <button onclick="sendMessage()">➤</button>

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
